<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maquette — Ordre Logique Vertical v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'fiesta-bg': '#FFFBF0',
            'fiesta-orange': '#FF6B35',
            'fiesta-rose': '#FF3CAC',
            'fiesta-yellow': '#FFD700',
            'fiesta-dark': '#1a1a2e',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
    * { font-family: 'Fredoka', sans-serif; }
  </style>
</head>
<body class="bg-fiesta-bg min-h-screen flex flex-col items-center p-4 gap-5 max-w-sm mx-auto">

  <!-- Consigne -->
  <div class="bg-white border-2 border-fiesta-orange rounded-2xl p-4 w-full text-center shadow-md">
    <h2 class="text-lg font-bold text-fiesta-dark leading-snug">
      Classez ces monuments parisiens du plus ancien au plus récent.
    </h2>
  </div>

  <!-- BOX DES CHOIX (horizontal wrap) -->
  <div class="w-full">
    <p class="text-xs font-bold text-fiesta-dark/50 mb-2 uppercase tracking-wider">Clique pour placer</p>
    <div class="flex flex-wrap gap-2" id="remaining">
      <button onclick="pickItem(this)" data-name="Arc de Triomphe" class="remaining-btn px-4 py-2.5 rounded-full border-2 border-fiesta-orange bg-white text-fiesta-dark font-bold text-sm hover:bg-fiesta-orange hover:text-white active:scale-95 transition-all cursor-pointer">
        Arc de Triomphe
      </button>
      <button onclick="pickItem(this)" data-name="Tour Eiffel" class="remaining-btn px-4 py-2.5 rounded-full border-2 border-fiesta-orange bg-white text-fiesta-dark font-bold text-sm hover:bg-fiesta-orange hover:text-white active:scale-95 transition-all cursor-pointer">
        Tour Eiffel
      </button>
      <button onclick="pickItem(this)" data-name="Notre-Dame" class="remaining-btn px-4 py-2.5 rounded-full border-2 border-fiesta-orange bg-white text-fiesta-dark font-bold text-sm hover:bg-fiesta-orange hover:text-white active:scale-95 transition-all cursor-pointer">
        Notre-Dame
      </button>
      <button onclick="pickItem(this)" data-name="Pont Neuf" class="remaining-btn px-4 py-2.5 rounded-full border-2 border-fiesta-orange bg-white text-fiesta-dark font-bold text-sm hover:bg-fiesta-orange hover:text-white active:scale-95 transition-all cursor-pointer">
        Pont Neuf
      </button>
    </div>
  </div>

  <!-- LISTE ORDONNÉE (vertical, en dessous) -->
  <div class="w-full">
    <p class="text-xs font-bold text-fiesta-dark/50 mb-2 uppercase tracking-wider">Ton ordre</p>
    <div class="flex flex-col gap-2 min-h-[60px] rounded-2xl border-2 border-dashed border-fiesta-rose/40 bg-fiesta-rose/5 p-3" id="ordered">
      <p id="empty-msg" class="text-sm text-fiesta-dark/30 italic text-center py-3">Clique sur un élément ci-dessus</p>
    </div>
  </div>

  <!-- Actions -->
  <div class="flex gap-3 w-full" id="actions" style="display:none;">
    <button onclick="undoLast()" class="flex-1 rounded-xl px-4 py-2.5 font-bold text-sm bg-white border-2 border-fiesta-dark/20 text-fiesta-dark hover:border-fiesta-dark/40 active:scale-95 transition-all">
      Annuler le dernier
    </button>
    <button id="validate-btn" onclick="validate()" style="display:none;" class="flex-1 rounded-xl px-4 py-3 font-bold text-lg bg-fiesta-orange text-white shadow-[0_4px_0_#c44d1a] hover:brightness-110 active:translate-y-[2px] active:shadow-none transition-all">
      Valider ✓
    </button>
  </div>

  <p class="text-fiesta-dark/40 text-xs mt-4">Maquette v2 — dolympia ordre logique</p>

  <script>
    let ordered = [];
    let selectedIndex = null;
    const allItems = ['Arc de Triomphe', 'Tour Eiffel', 'Notre-Dame', 'Pont Neuf'];

    function pickItem(btn) {
      const name = btn.getAttribute('data-name');
      btn.style.display = 'none';
      ordered.push(name);
      selectedIndex = null;
      render();
    }

    function undoLast() {
      if (ordered.length === 0) return;
      ordered.pop();
      selectedIndex = null;
      render();
    }

    function validate() {
      alert('Ordre validé : ' + ordered.join(' → '));
    }

    function moveUp(idx) {
      if (idx <= 0) return;
      [ordered[idx - 1], ordered[idx]] = [ordered[idx], ordered[idx - 1]];
      if (selectedIndex === idx) selectedIndex = idx - 1;
      render();
    }

    function moveDown(idx) {
      if (idx >= ordered.length - 1) return;
      [ordered[idx], ordered[idx + 1]] = [ordered[idx + 1], ordered[idx]];
      if (selectedIndex === idx) selectedIndex = idx + 1;
      render();
    }

    function removeItem(idx) {
      ordered.splice(idx, 1);
      selectedIndex = null;
      render();
    }

    function tapItem(idx) {
      if (selectedIndex === null) {
        selectedIndex = idx;
      } else if (selectedIndex === idx) {
        selectedIndex = null;
      } else {
        // Swap
        [ordered[selectedIndex], ordered[idx]] = [ordered[idx], ordered[selectedIndex]];
        selectedIndex = null;
      }
      render();
    }

    function render() {
      // Remaining
      document.querySelectorAll('.remaining-btn').forEach(btn => {
        const name = btn.getAttribute('data-name');
        btn.style.display = ordered.includes(name) ? 'none' : '';
      });

      // Ordered
      const container = document.getElementById('ordered');
      const emptyMsg = document.getElementById('empty-msg');

      // Clear existing items (keep empty msg)
      container.querySelectorAll('.ordered-item').forEach(el => el.remove());

      if (ordered.length === 0) {
        emptyMsg.style.display = '';
      } else {
        emptyMsg.style.display = 'none';
        ordered.forEach((name, i) => {
          const isSelected = selectedIndex === i;
          const div = document.createElement('div');
          div.className = `ordered-item flex items-center gap-2 rounded-xl px-3 py-2.5 text-sm font-bold transition-all cursor-pointer ${
            isSelected
              ? 'bg-fiesta-orange text-white ring-2 ring-fiesta-yellow ring-offset-2 scale-[1.02]'
              : 'bg-fiesta-rose text-white'
          }`;
          div.onclick = (e) => {
            if (e.target.closest('button')) return;
            tapItem(i);
          };
          div.innerHTML = `
            <span class="text-white/60 text-xs w-5 shrink-0">${i + 1}.</span>
            <span class="flex-1 truncate">${name}</span>
            <div class="flex gap-1 shrink-0">
              <button onclick="event.stopPropagation(); moveUp(${i})" class="w-7 h-7 flex items-center justify-center rounded-lg bg-white/20 hover:bg-white/40 text-xs transition-all ${i === 0 ? 'opacity-30 pointer-events-none' : ''}">▲</button>
              <button onclick="event.stopPropagation(); moveDown(${i})" class="w-7 h-7 flex items-center justify-center rounded-lg bg-white/20 hover:bg-white/40 text-xs transition-all ${i === ordered.length - 1 ? 'opacity-30 pointer-events-none' : ''}">▼</button>
              <button onclick="event.stopPropagation(); removeItem(${i})" class="w-7 h-7 flex items-center justify-center rounded-lg bg-white/20 hover:bg-white/40 text-xs transition-all">✕</button>
            </div>
          `;
          container.appendChild(div);
        });
      }

      // Actions
      const actions = document.getElementById('actions');
      const validateBtn = document.getElementById('validate-btn');
      actions.style.display = ordered.length > 0 ? 'flex' : 'none';
      validateBtn.style.display = ordered.length === allItems.length ? '' : 'none';
    }
  </script>
</body>
</html>
